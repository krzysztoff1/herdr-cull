# herdr-plugin.toml — manifest for herdr-cull.
#
# Lists every non-working agent pane (Claude, Codex, …) in one review overlay,
# split into two groups — "stale" (idle past a threshold) and "active recently"
# — as an fzf multi-select. Both groups are selectable; nothing is ever closed
# without your confirmation. The overlay appears ONLY in response to the `open`
# action — there are no event hooks, so the plugin does nothing until you ask.

id = "herdr-cull"
name = "Cull (idle agent panes)"
version = "0.4.0"
description = "Review and close herdr agent panes in one fzf overlay — stale sessions (idle past a threshold, default 4h) flagged on top, active-recently ones still selectable below. Nothing closes without your confirmation."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

# The review UI. The `open` action summons it. It runs in an overlay so fzf gets
# a real TTY (an action runs on the server without one). Located via
# $HERDR_PLUGIN_ROOT because herdr spawns the pane with cwd = the launcher's
# --cwd, not the plugin root — a bare relative path would fail to resolve.
[[panes]]
id = "cull"
title = "Cull agent panes"
placement = "overlay"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/cull.sh\""]

# Summon the review overlay. Runs on the herdr server (no TTY), so it cannot run
# fzf itself — it just opens the `cull` overlay pane above. cwd defaults to the
# plugin root for actions, so the relative open.sh path resolves.
[[actions]]
id = "open"
title = "Review & close agent panes"
description = "Review agent panes in an fzf overlay — stale ones flagged, all selectable — and close the ones you pick."
contexts = ["workspace"]
command = ["bash", "open.sh"]
