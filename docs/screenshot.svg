<svg xmlns="http://www.w3.org/2000/svg" width="960" height="408" viewBox="0 0 960 408" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,'Liberation Mono',monospace" font-size="15">
  <!-- terminal window -->
  <rect x="0" y="0" width="960" height="408" rx="11" fill="#191724"/>
  <rect x="0.5" y="0.5" width="959" height="407" rx="10.5" fill="none" stroke="#26233a" stroke-width="1"/>

  <!-- title bar -->
